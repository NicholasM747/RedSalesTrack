<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volunteer Sign-In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e5e2;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 9px 12px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      margin-bottom: 14px;
      color: #111;
      background: #fff;
    }
    input:focus { border-color: #aaa; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .row input { margin-bottom: 0; }
    .row-wrap { margin-bottom: 14px; }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      font-size: 15px;
      font-weight: 500;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    button:active { transform: scale(0.98); }
    .success {
      display: none;
      background: #edf7ed;
      border: 1px solid #b6deb7;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      color: #2d6a2f;
      margin-top: 12px;
      text-align: center;
    }
    .error {
      display: none;
      background: #fdecea;
      border: 1px solid #f5c0bc;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      color: #a82a22;
      margin-top: 12px;
      text-align: center;
    }
    .spinner {
      display: none;
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Volunteer sign-in</h1>
    <p class="sub">Fill out your details at the start and end of your shift.</p>

    <label for="name">Full name</label>
    <input type="text" id="name" placeholder="Your name" autocomplete="name" />

    <label for="date">Date</label>
    <input type="date" id="date" />

    <div class="row-wrap">
      <div class="row">
        <div>
          <label for="time-in">Time in</label>
          <input type="time" id="time-in" />
        </div>
        <div>
          <label for="time-out">Time out</label>
          <input type="time" id="time-out" />
        </div>
      </div>
    </div>

    <button onclick="submitForm()">Submit sign-in</button>
    <div class="success" id="success">✓ Sign-in recorded — thanks!</div>
    <div class="error" id="error"></div>
    <div class="spinner" id="spinner">Saving...</div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRL7iBGn_83LcdRNwb9jCdpsLWladjsFu3NO4S0IxrPJaPhEDzPlMbVBCBQ-pPEEiv/exec";

    document.getElementById("date").value = new Date().toISOString().split("T")[0];

    async function submitForm() {
      const name = document.getElementById("name").value.trim();
      const date = document.getElementById("date").value;
      const timeIn = document.getElementById("time-in").value;
      const timeOut = document.getElementById("time-out").value;

      const errEl = document.getElementById("error");
      const sucEl = document.getElementById("success");
      const spin = document.getElementById("spinner");

      errEl.style.display = "none";
      sucEl.style.display = "none";

      if (!name || !date || !timeIn || !timeOut) {
        errEl.textContent = "Please fill in all fields before submitting.";
        errEl.style.display = "block";
        return;
      }

      spin.style.display = "block";

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, date, timeIn, timeOut })
        });

        spin.style.display = "none";
        sucEl.style.display = "block";
        document.getElementById("name").value = "";
        document.getElementById("time-in").value = "";
        document.getElementById("time-out").value = "";
      } catch (e) {
        spin.style.display = "none";
        errEl.textContent = "Something went wrong. Please try again.";
        errEl.style.display = "block";
      }
    }
  </script>
</body>
</html>
